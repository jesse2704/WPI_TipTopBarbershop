name: Deploy to FTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # - name: Seed deploy sync state
      #   env:
      #     FTP_SERVER: ${{ secrets.FTP_SERVER }}
      #     FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      #     FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      #   run: |
      #     printf '{}' > .ftp-deploy-sync-state.json
      #     curl --fail --silent --show-error --ftp-create-dirs \
      #       -u "$FTP_USERNAME:$FTP_PASSWORD" \
      #       -T .ftp-deploy-sync-state.json \
      #       "ftp://$FTP_SERVER/domains/jesseakoma.nl/public_html/tiptopbarbershop/.ftp-deploy-sync-state.json"

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./dist/
          server-dir: /domains/jesseakoma.nl/public_html/tiptopbarbershop/
          dangerous-clean-slate: false