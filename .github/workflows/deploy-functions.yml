name: Deploy Firebase Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase Functions dependencies
        run: npm ci
        working-directory: ./functions

      - name: Build Firebase Functions
        run: npm run build
        working-directory: ./functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: wpi-tiptopbarbershop
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WPI_TIPTOPBARBERSHOP }}

      - name: Show authenticated service account
        run: |
          echo "Deploy identity: $(jq -r '.client_email' \"$GOOGLE_GHA_CREDS_PATH\")"

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project wpi-tiptopbarbershop --non-interactive
